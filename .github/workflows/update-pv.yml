name: Update PV from repository dispatch

on:
  repository_dispatch:
    types: [update-pv]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  update_pv:
    runs-on: ubuntu-latest
    steps:
      - name: Update issue title by API
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const payload = context.payload.client_payload || {};
            const owner = payload.owner || context.repo.owner;
            const repo = payload.repo || context.repo.repo;
            const issue_number = Number(payload.issue_number || 1);
            const increment = Number(payload.increment || 1);

            const issue = await github.rest.issues.get({ owner, repo, issue_number });
            const title = issue.data.title || "PV: 0";
            const match = title.match(/PV:\s*(\d+)/i);
            const current = match ? Number(match[1]) : 0;
            const next = current + increment;
            const nextTitle = `PV: ${next}`;

            await github.rest.issues.update({
              owner,
              repo,
              issue_number,
              title: nextTitle,
            });

            core.info(`Updated PV -> ${next}`);
